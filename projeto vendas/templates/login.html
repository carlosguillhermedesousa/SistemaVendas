{% extends 'layout.html' %}
{% block content %}
<div class="row justify-content-center align-items-center min-vh-80">
  <div class="col-12 col-md-8 col-lg-12 col-xl-12">
    <div class="card auth-card rounded-4 shadow-lg border-0 overflow-hidden">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <div class="badge badge-status mb-3">Acesso Seguro</div>
          <h2 class="fw-bold">Bem-vindo</h2>
          <p class="text-muted">Entre com seu usuário e senha para acessar o sistema.</p>
        </div>
        <form method="post">
          <div class="mb-3">
            <label class="form-label text-white">Usuário</label>
            <div class="input-group input-group-lg">
              <span class="input-group-text bg-slate-900 border-secondary text-slate-300"><i class="fa-solid fa-user"></i></span>
              <input type="text" class="form-control" name="username" required placeholder="Digite seu usuário">
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label text-white">Senha</label>
            <div class="input-group input-group-lg">
              <span class="input-group-text bg-slate-900 border-secondary text-slate-300"><i class="fa-solid fa-lock"></i></span>
              <input type="password" class="form-control" name="password" required placeholder="Digite sua senha">
            </div>
          </div>
          <button class="btn btn-primary btn-lg w-100">Entrar</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
