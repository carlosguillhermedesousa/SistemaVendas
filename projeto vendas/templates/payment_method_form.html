{% extends 'layout.html' %}
{% block content %}
<div class="section-header mb-4">
  <div>
    <h3>{{ 'Editar forma de pagamento' if payment_method else 'Nova forma de pagamento' }}</h3>
    <p class="text-muted">Configure formas de pagamento para vendas.</p>
  </div>
</div>
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card p-4">
      <form method="post" class="row g-3">
        <div class="col-12">
          <label class="form-label text-white">Nome</label>
          <input type="text" name="name" class="form-control" value="{{ payment_method.name if payment_method else '' }}" required>
        </div>
        <div class="col-12">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="active" id="active" {% if payment_method and payment_method.active %}checked{% endif %}>
            <label class="form-check-label text-white" for="active">
              Ativo
            </label>
          </div>
        </div>
        <div class="col-12 d-flex gap-2">
          <button class="btn btn-primary flex-fill">Salvar</button>
          <a href="{{ url_for('payment_methods.list_payment_methods') }}" class="btn btn-outline-light flex-fill">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
