{% extends 'layout.html' %}
{% block content %}
<div class="section-header mb-4">
  <div>
    <h3>Entrada de estoque</h3>
    <p class="text-muted">Registre a reposição de estoque e mantenha o inventário atualizado.</p>
  </div>
</div>
<div class="card p-4">
  <form method="post" class="row g-4 align-items-end">
    <div class="col-md-7">
      <label class="form-label text-white">Produto</label>
      <select class="form-select" name="product_id" required>
        <option value="">Selecione o produto</option>
        {% for product in products %}
        <option value="{{ product.id }}">{{ product.name }} ({{ product.barcode }})</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-3">
      <label class="form-label text-white">Quantidade</label>
      <input class="form-control" name="quantity" type="number" min="1" required>
    </div>
    <div class="col-md-2 d-grid">
      <button class="btn btn-primary">Registrar</button>
    </div>
  </form>
</div>
{% endblock %}
