{% extends 'layout.html' %}
{% block content %}
<div class="section-header mb-4">
  <div>
    <h3>{{ 'Editar produto' if product else 'Novo produto' }}</h3>
    <p class="text-muted">Cadastre produtos com preço e margem para controle de estoque profissional.</p>
  </div>
</div>
<div class="card p-4">
  <form method="post" class="row g-4">
    <div class="col-md-4">
      <label class="form-label text-white">Código de barras</label>
      <input type="text" name="barcode" class="form-control" value="{{ product.barcode if product else '' }}" required>
    </div>
    <div class="col-md-4">
      <label class="form-label text-white">Nome</label>
      <input type="text" name="name" class="form-control" value="{{ product.name if product else '' }}" required>
    </div>
    <div class="col-md-4">
      <label class="form-label text-white">Descrição</label>
      <input type="text" name="description" class="form-control" value="{{ product.description if product else '' }}">
    </div>
    <div class="col-md-4">
      <label class="form-label text-white">Marca</label>
      <input type="text" name="brand" class="form-control" value="{{ product.brand if product else '' }}">
    </div>
    <div class="col-md-4">
      <label class="form-label text-white">Categoria</label>
      <input type="text" name="category" class="form-control" value="{{ product.category if product else '' }}" required>
    </div>
    <div class="col-md-4">
      <label class="form-label text-white">Unidade</label>
      <select name="unit" class="form-select">
        <option value="UN" {% if product and product.unit == 'UN' %}selected{% endif %}>UN</option>
        <option value="CX" {% if product and product.unit == 'CX' %}selected{% endif %}>CX</option>
        <option value="KG" {% if product and product.unit == 'KG' %}selected{% endif %}>KG</option>
        <option value="M" {% if product and product.unit == 'M' %}selected{% endif %}>M</option>
      </select>
    </div>
    <div class="col-md-4">
      <label class="form-label text-white">Preço de custo</label>
      <input type="number" step="0.01" name="cost_price" class="form-control" value="{{ product.cost_price if product else '' }}" required>
    </div>
    <div class="col-md-4">
      <label class="form-label text-white">Margem (%)</label>
      <input type="number" step="0.01" name="margin" class="form-control" value="{{ product.margin if product else '' }}" required>
    </div>
    <div class="col-md-4">
      <label class="form-label text-white">Estoque mínimo</label>
      <input type="number" name="min_stock" class="form-control" value="{{ product.min_stock if product else '' }}" required>
    </div>
    <div class="col-12 d-flex gap-2">
      <button class="btn btn-primary flex-fill">Salvar produto</button>
      <a href="{{ url_for('products.list_products') }}" class="btn btn-outline-light flex-fill">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
